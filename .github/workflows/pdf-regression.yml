name: PDF Regression

on:
  pull_request:
  push:
    branches:
      - main
      - ci/*
      - feat/*

jobs:
  pdf-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pypdf

      - name: Start Next.js server
        run: |
          npm run build
          npm run start &
          sleep 10

      - name: Run PDF regression
        run: |
          pwsh -ExecutionPolicy Bypass -File ./scripts/regress-pdf.ps1 `
            -BaseUrl "http://127.0.0.1:3000" `
            -DownloadToken "DEV_MODE_TOKEN" `
            -Level "brand"
