name: pdf-regress-dev

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  regress:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf

      - name: Install Node dependencies
        run: npm ci

      - name: Create .env for CI
        shell: pwsh
        run: |
          @"
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DIRECT_URL=${{ secrets.DIRECT_URL }}
          DOWNLOAD_TOKEN_SECRET=${{ secrets.DOWNLOAD_TOKEN_SECRET }}
          INTERNAL_PACK_SECRET=${{ secrets.INTERNAL_PACK_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Build Next app
        run: npm run build

      - name: Start Next server (background)
        shell: pwsh
        run: |
          Start-Process -FilePath "npm" -ArgumentList "run","start","--","-p","3000" -NoNewWindow
          Start-Sleep -Seconds 3

      - name: Wait for server ready
        shell: pwsh
        run: |
          $ok = $false
          for ($i=0; $i -lt 60; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:3000/api/download-token?planId=attaguy-plan&mode=full" -TimeoutSec 5
              if ($r.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ok) {
            throw "Server not ready on http://localhost:3000"
          }
          Write-Host "server_ready=YES"

      - name: Run PDF regression
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\regress-pdf.ps1 `
            -BaseUrl "http://localhost:3000" `
            -TimeoutSec 180

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regress-output
          path: |
            _regress/**
            _golden/**