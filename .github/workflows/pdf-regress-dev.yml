name: PDF Regress (dev)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  regress:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      # 如果你的 CI 需要 Prisma client，保留；不需要可删
      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Start Next dev (background)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          # 启动 dev 并把 PID 写到文件，便于后面清理
          $p = Start-Process -FilePath "npm" -ArgumentList @("run","dev","--","-p","3000") -PassThru -WindowStyle Hidden
          $p.Id | Out-File -Encoding ascii .\.ci_next_pid.txt
          "NEXT_PID=$($p.Id)" | Out-Host

      - name: Wait for server
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $url = "http://127.0.0.1:3000"
          $deadline = (Get-Date).AddSeconds(120)
          while ((Get-Date) -lt $deadline) {
            try {
              Invoke-WebRequest -Uri $url -Method Head -TimeoutSec 5 | Out-Null
              "Server ready: $url" | Out-Host
              exit 0
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          throw "Server not ready within 120s: $url"

      - name: Run PDF regress (CI gate)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          # 默认 FailOnDiff=true（你脚本里已经是 CI gate）
          # 如需临时放行可设置 REGRESS_FAIL_ON_DIFF=0
          powershell -ExecutionPolicy Bypass -File .\scripts\regress-pdf.ps1 -BaseUrl "http://127.0.0.1:3000"

      - name: Cleanup Next dev
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          if (Test-Path .\.ci_next_pid.txt) {
            $pid = (Get-Content .\.ci_next_pid.txt -Raw).Trim()
            if ($pid) {
              "Stopping NEXT dev PID=$pid" | Out-Host
              Stop-Process -Id ([int]$pid) -Force -ErrorAction SilentlyContinue
            }
          }
