name: PDF Regression

on:
  pull_request:
    paths:
      - "app/api/pdf/**"
      - "app/api/tender-pack/**"
      - "app/result/**"
      - "app/components/**"
      - "components/**"
      - "lib/pdf/**"
      - "lib/license/**"
      - "lib/audit/**"
      - "scripts/regress-pdf.ps1"
      - "_golden/**"
      - ".github/workflows/pdf-regression.yml"
  push:
    branches:
      - main
      - ci/*
      - feat/*
    paths:
      - "app/api/pdf/**"
      - "app/api/tender-pack/**"
      - "app/result/**"
      - "app/components/**"
      - "components/**"
      - "lib/pdf/**"
      - "lib/license/**"
      - "lib/audit/**"
      - "scripts/regress-pdf.ps1"
      - "_golden/**"
      - ".github/workflows/pdf-regression.yml"

jobs:
  pdf-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: "true"
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install pypdf

      - name: Start Next.js server
        run: |
          npm run build
          npm run start &

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -s http://127.0.0.1:3000/api/download-token?mode=full\&planId=attaguy-plan > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run PDF regression
        shell: pwsh
        run: |
          ./scripts/regress-pdf.ps1 `
            -BaseUrl "http://127.0.0.1:3000" `
            -DownloadToken "DEV_MODE_TOKEN" `
            -Level "brand"

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-regression-artifacts
          path: |
            _regress/**
            _golden/report.json
            .next-start.log
          if-no-files-found: warn
          retention-days: 14

      - name: Show report summary
        if: always()
        shell: bash
        run: |
          echo "===== _regress/report.json ====="
          if [ -f "_regress/report.json" ]; then
            head -n 200 _regress/report.json
          fi
          echo "===== _regress/diff.json ====="
          if [ -f "_regress/diff.json" ]; then
            head -n 200 _regress/diff.json
          fi

      - name: Stop app
        if: always()
        shell: bash
        run: |
          if [ -f ".next-start.pid" ]; then
            kill "$(cat .next-start.pid)" || true
          fi