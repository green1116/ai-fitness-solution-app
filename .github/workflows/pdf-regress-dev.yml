name: PDF Regress (dev+build)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  regress_dev:
    name: regress (dev)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Start Next dev (background)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $proc = Start-Process -FilePath "npm" -ArgumentList @("run","dev","--","-p","3000") -PassThru -WindowStyle Hidden
          $proc.Id | Out-File -Encoding ascii .\.ci_next_dev_pid.txt
          "NEXT_DEV_PID=$($proc.Id)" | Out-Host

      - name: Wait for server (dev)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $url = "http://127.0.0.1:3000"
          $deadline = (Get-Date).AddSeconds(180)
          while ((Get-Date) -lt $deadline) {
            try {
              Invoke-WebRequest -Uri $url -Method Head -TimeoutSec 5 | Out-Null
              "Server ready: $url" | Out-Host
              exit 0
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          throw "Server not ready within 180s: $url"

      - name: Run PDF regress (dev gate)
        shell: powershell
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "1"
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File .\scripts\regress-pdf.ps1 -BaseUrl "http://127.0.0.1:3000"

      - name: Cleanup Next dev
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $pidFile = ".\.ci_next_dev_pid.txt"
          if (Test-Path $pidFile) {
            $nextPid = (Get-Content $pidFile -Raw).Trim()
            if ($nextPid -match '^\d+$') {
              Write-Host "Stopping NEXT dev PID=$nextPid"
              Stop-Process -Id ([int]$nextPid) -Force -ErrorAction SilentlyContinue
            } else {
              Write-Host "PID file not a number: $nextPid"
            }
          } else {
            Write-Host "No pid file, skip cleanup"
          }
          exit 0

  regress_build:
    name: regress (build)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build Next (production)
        shell: powershell
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "1"
        run: |
          $ErrorActionPreference = "Stop"
          npm run build

      - name: Start Next start (background)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $proc = Start-Process -FilePath "npm" -ArgumentList @("run","start","--","-p","3000") -PassThru -WindowStyle Hidden
          $proc.Id | Out-File -Encoding ascii .\.ci_next_start_pid.txt
          "NEXT_START_PID=$($proc.Id)" | Out-Host

      - name: Wait for server (start)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $url = "http://127.0.0.1:3000"
          $deadline = (Get-Date).AddSeconds(180)
          while ((Get-Date) -lt $deadline) {
            try {
              Invoke-WebRequest -Uri $url -Method Head -TimeoutSec 5 | Out-Null
              "Server ready: $url" | Out-Host
              exit 0
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          throw "Server not ready within 180s: $url"

      - name: Run PDF regress (build gate)
        shell: powershell
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "1"
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File .\scripts\regress-pdf.ps1 -BaseUrl "http://127.0.0.1:3000"

      - name: Cleanup Next start
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $pidFile = ".\.ci_next_start_pid.txt"
          if (Test-Path $pidFile) {
            $nextPid = (Get-Content $pidFile -Raw).Trim()
            if ($nextPid -match '^\d+$') {
              Write-Host "Stopping NEXT start PID=$nextPid"
              Stop-Process -Id ([int]$nextPid) -Force -ErrorAction SilentlyContinue
            } else {
              Write-Host "PID file not a number: $nextPid"
            }
          } else {
            Write-Host "No pid file, skip cleanup"
          }
          exit 0